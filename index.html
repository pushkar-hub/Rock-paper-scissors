<!DOCTYPE html>
<html>
    <head>
        
        <title>
            Rock Paper Scissors game
        </title>
        
        <link rel="stylesheet" href="styles/RockPaperScissor.css">

        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        
    </head>
    <body>
        
        <p class="title">
            Rock Paper Scissors
        </p>
       
       <button class="move-button js-rock-button">
            <img src="images/Rock-emoji.png" class="move-icon">
        </button>
       
       <button class="move-button js-paper-button">
            <img src="images/Paper-emoji.png" class="move-icon">
        </button>
       
       <button class="move-button js-scissors-button">
            <img src="images/Scissors-emoji.png" class="move-icon">
        </button>

        <p class="js-result result"></p>

        <p class="js-move"></p>
        
        <p class="js-score score"></p>
       
       <button class="reset-score-button js-reset-score-button">
            Reset Score
        </button>

        <button class="js-autoPlay-button autoPlay-button">
            Auto Play
        </button>

        <p class="js-warning warning"></p>

        <script src="script/RockPaperScissor.js"></script>

    </body>
</html>
